name: Daily ETL

on:
  schedule:
    # 17:30 Asia/Ho_Chi_Minh, after Vietnam market close, Monday-Friday.
    - cron: "30 10 * * 1-5"
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  generate:
    name: Generate and validate data
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate static data
        run: npm run data:generate

      - name: Validate generated data contracts
        run: npm run data:validate
